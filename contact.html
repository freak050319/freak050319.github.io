<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="联系刘一飞 / freEak">
    <title>联系 - 刘一飞 / freEak</title>
    <link rel="stylesheet" href="styles/site.css">
  </head>
  <body data-page="contact">
    <header class="site-header">
      <a class="brand-mark" href="index.html" aria-label="回到首页">
        <span data-bind="site.name">刘一飞</span>
        <span data-bind="site.handle">freEak</span>
      </a>
      <nav class="main-nav" aria-label="主导航">
        <a href="works.html" data-nav="works">作品</a>
        <a href="about.html" data-nav="about">档案</a>
        <a href="contact.html" data-nav="contact">联系</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading reveal">
        <p class="eyebrow">Contact</p>
        <h1>欢迎联系我聊岗位、项目和作品集反馈。</h1>
        <p data-bind="contact.note">目前开放游戏 UI、界面拼接、交互体验相关机会。</p>
      </section>

      <section class="contact-layout">
        <div class="contact-methods" id="contactMethods"></div>
        <form class="contact-form" id="contactForm">
          <label>
            <span>你的称呼</span>
            <input name="name" autocomplete="name" required>
          </label>
          <label>
            <span>邮箱</span>
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            <span>想说的话</span>
            <textarea name="message" rows="6" required></textarea>
          </label>
          <button class="button primary" type="submit">发送邮件</button>
        </form>
      </section>
    </main>

    <script src="scripts/content.js"></script>
    <script src="scripts/site.js"></script>
  </body>
</html>
